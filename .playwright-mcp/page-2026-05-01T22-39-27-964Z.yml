        - text: Wie er achter WebsUp zit
        - heading "Hoi, ik ben Daan" [level=2] [ref=e45]
        - generic [ref=e46]:
          - paragraph [ref=e47]: Ik ben Daan Koolhaas — webdesigner en digitaal bouwer uit Friesland. Maar ook iemand met een achtergrond die verder gaat dan pixels en code.
          - paragraph [ref=e48]: Naast WebsUp werk ik als werkvoorbereider bij een technisch installatiebedrijf. Dagelijks ben ik bezig met energiesystemen, EMS, thuisbatterijen en technische installaties. Dat klinkt als een vreemde combinatie, maar het maakt me een betere partner voor technische bedrijven die online professioneler willen overkomen.
          - paragraph [ref=e49]: Ik begrijp hoe installateurs denken. Ik begrijp wat ondernemers nodig hebben. En ik weet hoe je dat vertaalt naar een website die vertrouwen wekt bij precies de juiste doelgroep.
          - paragraph [ref=e50]: WebsUp is bewust persoonlijk gebleven. Je praat met degene die jouw website daadwerkelijk bouwt — niet met een sales persoon die het doorgeeft.
        - list [ref=e51]:
          - listitem [ref=e52]:
            - img [ref=e53]
            - generic [ref=e55]: Direct contact met degene die meedenkt en bouwt
          - listitem [ref=e56]:
            - img [ref=e57]
            - generic [ref=e59]: Eerlijk advies over wat wel en niet nodig is
          - listitem [ref=e60]:
            - img [ref=e61]
            - generic [ref=e63]: Technisch sterk — van website tot koppeling
          - listitem [ref=e64]:
            - img [ref=e65]
            - generic [ref=e67]: Ruimte om later verder door te bouwen
      - generic [ref=e70]:
        - heading "Persoonlijk samenwerken, zonder het groter te maken dan het is" [level=2] [ref=e71]
        - generic [ref=e72]:
          - paragraph [ref=e73]: "WebsUp is geen groot bureau met accountmanagers, saleslagen of trajecten die onnodig zwaar worden opgetuigd. Het voordeel is simpel: communicatie blijft helder, keuzes blijven logisch en het werk blijft dicht op de praktijk."
          - paragraph [ref=e74]: Juist daardoor is er ruimte om eerlijk te kijken naar wat nodig is, en wat niet. Soms is dat een complete website. Soms een slimmere structuur, een webshop of een maatwerk oplossing achter de schermen.
          - paragraph [ref=e75]: Het doel is niet om overal een groot verhaal van te maken, maar om iets neer te zetten dat technisch klopt, prettig werkt en later nog verder kan meegroeien.
      - generic [ref=e77]:
