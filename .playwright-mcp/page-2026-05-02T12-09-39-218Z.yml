            - generic [ref=e77]:
              - generic [ref=e80]:
                - paragraph [ref=e81]: Flexx Music Woldhoorn biedt u een blazersensemble en bigband. We werken projectmatig en kunnen daarom goed aansluiten op uw event.
                - paragraph [ref=e82]: Het blazersensemble speelt eigentijdse en oudere muziek in alle soorten en maten. Bijvoorbeeld volksmuziek of licht klassieke muziek. Alle instrumenten zijn welkom, van trompet tot klarinet, bas tot contrabas en van saxofoon tot piano.
                - paragraph [ref=e83]: De bigband neemt het programma met lichte muziek voor haar rekening. De band speelt lekker swingende muziek zoals Jazz, Funk, Rock en Pop.
                - paragraph [ref=e84]: Wij voegen graag net dat stukje extra sfeer toe aan uw project. Neem contact met ons op voor de mogelijkheden of kijk in de agenda voor het volgende event!
