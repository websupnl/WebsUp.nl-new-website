            - paragraph [ref=e138]: Veenstra Boor- en Freeswerken is een toegewijd en professioneel bedrijf gevestigd in Drachten. Wij streven naar het leveren van hoogwaardige boor- en freesdiensten voor zowel aannemers, installatiebedrijven en particuliere.
            - generic [ref=e140]:
              - paragraph [ref=e141]: Gedreven door passie voor het vak en met een scherp oog voor detail, zetten wij ons in voor elk project. Door gebruik te maken van de nieuwste technologieën en beste praktijken in de industrie, bieden wij oplossingen die niet alleen voldoen aan, maar ook de normen van de branche overtreffen.
              - paragraph [ref=e142]:
