          - heading "Hoi, ik ben Daan" [level=2] [ref=e56]
          - generic [ref=e57]:
            - paragraph [ref=e58]: Ik ben Daan Koolhaas, webdesigner en digitaal bouwer uit Friesland. Maar ook iemand met een achtergrond die verder gaat dan pixels en code.
            - paragraph [ref=e59]: Naast WebsUp werk ik als werkvoorbereider bij een technisch installatiebedrijf. Dagelijks ben ik bezig met energiesystemen, EMS, thuisbatterijen en technische installaties. Dat klinkt als een vreemde combinatie, maar het maakt me een betere partner voor technische bedrijven die online professioneler willen overkomen.
            - paragraph [ref=e60]: Ik begrijp hoe installateurs denken. Ik begrijp wat ondernemers nodig hebben. En ik weet hoe je dat vertaalt naar een website die vertrouwen wekt bij precies de juiste doelgroep.
            - paragraph [ref=e61]: WebsUp is bewust persoonlijk gebleven. Je praat met degene die jouw website daadwerkelijk bouwt, niet met een salespersoon die het doorgeeft.
          - list [ref=e62]:
            - listitem [ref=e63]:
              - img [ref=e64]
              - generic [ref=e66]: Direct contact met degene die meedenkt en bouwt
            - listitem [ref=e67]:
