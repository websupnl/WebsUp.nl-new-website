            - listitem [ref=e75]:
              - img [ref=e76]
              - generic [ref=e78]: Ruimte om later verder door te bouwen
      - generic [ref=e80]:
        - heading "Persoonlijk samenwerken, zonder het groter te maken dan het is" [level=2] [ref=e82]
        - generic [ref=e84]:
          - paragraph [ref=e85]: "WebsUp is geen groot bureau met accountmanagers, saleslagen of trajecten die onnodig zwaar worden opgetuigd. Het voordeel is simpel: communicatie blijft helder, keuzes blijven logisch en het werk blijft dicht op de praktijk."
          - paragraph [ref=e86]: Juist daardoor is er ruimte om eerlijk te kijken naar wat nodig is, en wat niet. Soms is dat een complete website. Soms een slimmere structuur, een webshop of een maatwerk oplossing achter de schermen.
          - paragraph [ref=e87]: Het doel is niet om overal een groot verhaal van te maken, maar om iets neer te zetten dat technisch klopt, prettig werkt en later nog verder kan meegroeien.
