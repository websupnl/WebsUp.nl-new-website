          - generic [ref=e116]:
            - paragraph [ref=e117]: WebsUp is geen groot bureau met accountmanagers, saleslagen of trajecten die onnodig zwaar worden opgetuigd. Communicatie blijft helder, keuzes blijven logisch en het werk blijft dicht op de praktijk.
            - paragraph [ref=e118]: Juist daardoor is er ruimte om eerlijk te kijken naar wat nodig is, en wat niet. Soms een complete website. Soms een slimmere structuur, een webshop of een maatwerk oplossing.
            - paragraph [ref=e119]: Het doel is niet om overal een groot verhaal van te maken, maar om iets neer te zetten dat technisch klopt, prettig werkt en later verder kan meegroeien.
