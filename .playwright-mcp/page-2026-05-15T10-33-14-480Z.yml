          - heading "Hoi, ik ben Daan" [level=2] [ref=e91]
          - generic [ref=e92]:
            - paragraph [ref=e93]: Ik ben Daan Koolhaas, webdesigner en digitaal bouwer uit Friesland. Maar ook iemand met een achtergrond die verder gaat dan pixels en code.
            - paragraph [ref=e94]: Naast WebsUp werk ik als werkvoorbereider bij een technisch installatiebedrijf. Dagelijks bezig met energiesystemen, EMS, thuisbatterijen en technische installaties. Dat maakt me een betere partner voor technische bedrijven die online professioneler willen overkomen.
            - paragraph [ref=e95]: WebsUp is bewust persoonlijk gebleven. Je praat met degene die jouw website daadwerkelijk bouwt, niet met een salespersoon die het doorgeeft.
